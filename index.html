<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dotări Medicale — Spital Brașov</title>
<style>
:root{
  --ink:#0e1c2e;--paper:#f7f8fa;--card:#fff;--navy:#1f4e78;--navy-lt:#2e75b6;
  --line:#dde3ea;--ok:#2e8b57;--warn:#c79100;--err:#c0392b;--mut:#6b7a8d;
  --da:#e2efda;--nu:#fce4d6;--ver:#fff2cc;
  --row-ok:#e4f5ea;--row-ck:#fdf4d7;--row-px:#fde7e4;
  --mono:'JetBrains Mono','Cascadia Code','Consolas',monospace;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:13px}

/* ── Lock screen ── */
#lock{position:fixed;inset:0;background:linear-gradient(160deg,#1f4e78 0%,#0e1c2e 100%);z-index:1000;display:flex;align-items:center;justify-content:center}
#lock .box{background:#fff;border-radius:12px;padding:36px 40px;width:340px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
#lock h2{font-size:16px;color:var(--navy);margin-bottom:4px}
#lock .sub{font-size:11px;color:var(--mut);font-family:var(--mono);margin-bottom:22px}
#lock input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:12px;text-align:center;letter-spacing:1px}
#lock input:focus{outline:none;border-color:var(--navy-lt);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
#lock button{width:100%;padding:11px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#lock button:hover{background:var(--navy-lt)}
#lock .err{color:var(--err);font-size:11px;margin-top:10px;min-height:14px}
#lock .icon{font-size:34px;margin-bottom:12px}
body.locked>*:not(#lock){display:none!important}

header{background:var(--navy);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600;cursor:default;user-select:none}
header .proj{font-family:var(--mono);font-size:10px;opacity:.75}
.floor-tabs{display:flex;gap:4px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:5px;background:rgba(255,255,255,.12);cursor:pointer;font-size:12px;font-weight:600;border:1px solid transparent;transition:.15s;color:#fff}
.ftab:hover{background:rgba(255,255,255,.22)}
.ftab.on{background:#fff;color:var(--navy)}
.hdr-stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.12);border-radius:5px;padding:4px 10px;text-align:center;min-width:54px}
.stat b{display:block;font-size:15px;font-family:var(--mono)}
.stat span{font-size:9px;text-transform:uppercase;letter-spacing:.6px;opacity:.8}

.toolbar{background:var(--card);border-bottom:1px solid var(--line);padding:8px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:48px;z-index:40}
.toolbar input[type=search]{flex:1;min-width:170px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:var(--paper)}
.fbtn{padding:6px 12px;border:1px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer;font-size:12px;white-space:nowrap;transition:.15s}
.fbtn:hover{border-color:var(--navy-lt)}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fbtn .n{font-family:var(--mono);font-size:10px;opacity:.7;margin-left:4px}

main{padding:14px 18px 70px}

.sect-block{margin-bottom:14px;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(14,28,46,.06)}
.sect-hdr{background:var(--navy-lt);color:#fff;padding:8px 12px;font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.sect-hdr:hover{background:#3a80c2}
.sect-hdr .car{transition:.2s;font-size:11px;margin-right:8px}
.sect-hdr.closed .car{transform:rotate(-90deg)}
.sect-hdr .lft{display:flex;align-items:center}
.sect-hdr .prog{font-family:var(--mono);font-size:11px;opacity:.9}
.sect-body.hidden{display:none}
.inc-hdr{background:#dcebf7;padding:5px 12px;font-weight:600;font-size:12px;color:var(--navy);border-left:3px solid var(--navy-lt);display:flex;justify-content:space-between;cursor:pointer;user-select:none}
.inc-hdr:hover{background:#d0e4f4}
.inc-hdr .mini{font-family:var(--mono);font-size:10px;color:var(--mut);font-weight:400}
.inc-body.hidden{display:none}

table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:#eef2f7;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:5px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;user-select:none}
td{padding:5px 8px;border-bottom:1px solid #edf1f5;vertical-align:middle;font-size:12.5px}
tr:hover td{filter:brightness(.98)}
tr.st-ok td{background:var(--row-ok)}
tr.st-ck td{background:var(--row-ck)}
tr.st-px td{background:var(--row-px)}

.cod{font-family:var(--mono);font-size:10.5px;color:var(--navy);white-space:nowrap}
.den{font-weight:500}
.buc{font-family:var(--mono);text-align:center}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:1px dashed transparent;transition:.12s;user-select:none}
.badge:hover{border-color:currentColor;transform:scale(1.06)}
.b-da{background:var(--da);color:#3a6b28}
.b-nu{background:var(--nu);color:#a04818}
.b-ver{background:var(--ver);color:#8a6d00}
.badge.mod{box-shadow:0 0 0 2px rgba(46,117,182,.35)}
.badge .edit-hint{font-size:8px;opacity:.6;margin-left:2px}

.inst{font-size:10.5px;white-space:nowrap}
.src{font-size:10px;white-space:nowrap}
.fisa a{color:var(--navy-lt);font-size:10.5px;text-decoration:none}
.fisa a:hover{text-decoration:underline}

.obs{font-size:11px;color:var(--mut);max-width:300px;min-width:160px}
.obs-orig{display:block;margin-bottom:2px}
.obs-edit{width:100%;border:1px dashed transparent;border-radius:4px;padding:3px 5px;font-size:11px;font-family:var(--sans);color:var(--ink);background:transparent;resize:vertical;min-height:20px;transition:.15s}
.obs-edit:hover{border-color:var(--line);background:rgba(255,255,255,.6)}
.obs-edit:focus{outline:none;border-color:var(--navy-lt);background:#fff;box-shadow:0 0 0 2px rgba(46,117,182,.12)}
.obs-edit::placeholder{color:#b8c2cd;font-style:italic}
.obs-edit.has-note{border-color:#cfe0f0;background:#f4f9ff;font-weight:500}

.stx{display:flex;gap:3px}
.stx button{width:26px;height:24px;border:1px solid var(--line);background:var(--card);border-radius:4px;cursor:pointer;font-size:12px;transition:.12s;padding:0;line-height:1}
.stx button:hover{transform:scale(1.1)}
.stx button.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.stx button.ck{background:var(--warn);border-color:var(--warn);color:#fff}
.stx button.px{background:var(--err);border-color:var(--err);color:#fff}

/* ── RFI cell — clickable toggle ── */
.rfi-cell{cursor:pointer;text-align:center;min-width:30px;border-radius:4px;transition:.12s;user-select:none}
.rfi-cell:hover{background:rgba(192,57,43,.08)}
.rfi-on{color:var(--err);font-size:13px}
.rfi-off{color:#d5dce4;font-size:12px}
.rfi-cell .mod-dot{font-size:7px;vertical-align:top;color:var(--navy-lt)}

.pbar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;width:100px;overflow:hidden}
.pbar i{display:block;height:100%;background:#7fd49a;border-radius:2px;transition:.3s}

.footbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:8px 18px;display:flex;gap:10px;align-items:center;z-index:60;flex-wrap:wrap}
.footbar .msg{font-size:11px;color:var(--mut);margin-left:auto}
.abtn{padding:7px 14px;border-radius:6px;border:1px solid var(--navy);background:var(--navy);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.abtn.sec{background:var(--card);color:var(--navy)}
.abtn:hover{opacity:.9}
.expand-all{font-size:11px;color:var(--navy-lt);cursor:pointer;text-decoration:underline;white-space:nowrap}

@media(max-width:900px){
  .obs{max-width:170px;min-width:120px}
  header h1{font-size:13px}
  .hdr-stats{margin-left:0}
}
</style>

<script>
/* ── Password gate — 3 roluri ── */
const PW_ROLES={
  'bd76c170a48f1db3c3468f1fbfd8628a2eb8cf43ad5e9f2b983ae56b5d1b9c8b':'lvd',
  'ebad761f8d02f12530b071bd9782111960331cec635306d2b611ef3e905e5bd6':'ext1',
  '8ddd58c4925c294e8bbcfa8bb6950ca0241bef290a4aea246c679978ffcb1ef9':'ext2'
};
let ROLE=null;
async function sha256(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const v=document.getElementById('pw').value;
  const h=await sha256(v);
  if(PW_ROLES[h]){
    ROLE=PW_ROLES[h];
    try{sessionStorage.setItem('sb-auth',ROLE)}catch(e){}
    unlock();
  }else{
    document.getElementById('pwErr').textContent='Parolă incorectă';
    document.getElementById('pw').value='';
  }
}
function unlock(){
  document.body.classList.remove('locked');
  const l=document.getElementById('lock'); if(l) l.remove();
  if(typeof applyRole==='function') applyRole();
}
try{ const r=sessionStorage.getItem('sb-auth');
if(r && ['lvd','ext1','ext2'].includes(r)){
  ROLE=r;
  window.addEventListener('DOMContentLoaded',()=>unlock());
}}catch(e){}
</script>

const FLOORS = Object.keys(ALL);

/* ── Persistence ── */
let ST={}, NOTES={}, RVOV={}, RFIOV={}, COLLAPSE={};
let SRC_HIDDEN=false;
const K_ST='sb-status-v2', K_NT='sb-notes-v2', K_RV='sb-revit-v2', K_RF='sb-rfi-v2', K_UI='sb-ui-c7';
const store={
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r?JSON.parse(r.value):null } }catch(e){}
    try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null }catch(e){}
    return null;
  },
  async set(k,o){
    try{ if(window.storage){ await window.storage.set(k,JSON.stringify(o)); return } }catch(e){}
    try{ localStorage.setItem(k,JSON.stringify(o)) }catch(e){}
  }
};

let curFloor = FLOORS[0];
let filters = new Set();
let q = '';

function items(){ return ALL[curFloor] }
function stOf(it){ return ST[it.nr]||'' }
function noteOf(it){ return NOTES[it.nr]||'' }
function revitOf(it){ return RVOV[it.nr]||it.revit }
function isRevMod(it){ return RVOV[it.nr] && RVOV[it.nr]!==it.revit }
function rfiOf(it){ return RFIOV[it.nr]!==undefined ? RFIOV[it.nr] : it.rfi }
function isRfiMod(it){ return RFIOV[it.nr]!==undefined && RFIOV[it.nr]!==it.rfi }

async function setSt(nr,val){
  if(val) ST[nr]=val; else delete ST[nr];
  await store.set(K_ST,ST); render();
}
async function cycleRevit(nr,orig){
  const cur=RVOV[nr]||orig;
  const cyc={'DA':'NU','NU':'VER','VER':'DA'};
  const next=cyc[cur];
  if(next===orig) delete RVOV[nr]; else RVOV[nr]=next;
  await store.set(K_RV,RVOV); render();
}
async function toggleRfi(nr,orig){
  const cur=RFIOV[nr]!==undefined?RFIOV[nr]:orig;
  const next=!cur;
  if(next===orig) delete RFIOV[nr]; else RFIOV[nr]=next;
  await store.set(K_RF,RFIOV); render();
}

let noteTimer=null;
function onNote(nr,val){
  if(val.trim()) NOTES[nr]=val; else delete NOTES[nr];
  clearTimeout(noteTimer);
  noteTimer=setTimeout(async()=>{
    await store.set(K_NT,NOTES);
    document.getElementById('saveMsg').textContent='Salvat ✓ '+new Date().toLocaleTimeString('ro-RO');
  },500);
}

/* ── Secret: 7 taps pe titlu sau pe header-ul Sursă → toggle coloana Sursă ── */
let taps=[];
async function secretTap(){
  if(ROLE!=='lvd') return;   /* trucul funcționează doar pentru echipa LVD */
  const now=Date.now();
  taps=taps.filter(t=>now-t<4000);
  taps.push(now);
  if(taps.length>=7){
    taps=[];
    SRC_HIDDEN=!SRC_HIDDEN;
    await store.set(K_UI,{h:SRC_HIDDEN});
    render();
    const m=document.getElementById('saveMsg');
    m.textContent=SRC_HIDDEN?'· · ·':'Coloana Sursă vizibilă';
    setTimeout(()=>m.textContent='Statusuri, notițe, Revit și RFI: salvare automată',2500);
  }
}
/* Rol extern → sursa fortat ascunsă, indiferent de localStorage */
function applyRole(){
  if(ROLE!=='lvd'){ SRC_HIDDEN=true; }
  render();
}
document.addEventListener('click',e=>{
  if(e.target.closest('#appTitle')||e.target.closest('th.src-th')) secretTap();
});

function match(it){
  if(q){
    const s=(it.den+' '+it.cod+' '+it.furn+' '+it.obs+' '+noteOf(it)).toLowerCase();
    if(!s.includes(q)) return false;
  }
  for(const f of filters){
    if(f.startsWith('revit:') && revitOf(it)!==f.split(':')[1]) return false;
    if(f==='rfi' && !rfiOf(it)) return false;
    if(f==='inst' && !it.inst) return false;
    if(f==='st:todo' && stOf(it)) return false;
    if(f==='note' && !noteOf(it)) return false;
    if(f==='revmod' && !isRevMod(it)) return false;
  }
  return true;
}

function toggleSect(id){
  COLLAPSE[id]=!COLLAPSE[id];
  const b=document.getElementById('b-'+id), h=document.getElementById('h-'+id);
  if(b) b.classList.toggle('hidden',COLLAPSE[id]);
  if(h) h.classList.toggle('closed',COLLAPSE[id]);
}
let allCollapsed=false;
function toggleAll(){
  allCollapsed=!allCollapsed;
  document.querySelectorAll('.sect-body').forEach(b=>b.classList.toggle('hidden',allCollapsed));
  document.querySelectorAll('.sect-hdr').forEach(h=>h.classList.toggle('closed',allCollapsed));
  Object.keys(COLLAPSE).forEach(k=>COLLAPSE[k]=allCollapsed);
}

function render(){
  document.getElementById('floorTabs').innerHTML = FLOORS.map(f=>
    `<div class="ftab ${f===curFloor?'on':''}" onclick="selFloor('${f}')">${f}<span style="font-size:9px;opacity:.7;margin-left:4px">${ALL[f].length}</span></div>`
  ).join('');

  const D=items();
  const flt=D.filter(match);

  const all=D.length;
  const done=D.filter(it=>stOf(it)==='ok').length;
  const ck=D.filter(it=>stOf(it)==='ck').length;
  const px=D.filter(it=>stOf(it)==='px').length;
  const pct=Math.round(100*done/all);
  document.getElementById('hdrStats').innerHTML=`
    <div class="stat"><b>${all}</b><span>Total</span></div>
    <div class="stat"><b style="color:#7fd49a">${done}</b><span>OK</span></div>
    <div class="stat"><b style="color:#ffd97f">${ck}</b><span>Verif</span></div>
    <div class="stat"><b style="color:#ff9d8a">${px}</b><span>Probl</span></div>
    <div class="stat"><b>${pct}%</b><span>Progres</span><div class="pbar"><i style="width:${pct}%"></i></div></div>`;

  document.getElementById('nDA').textContent=D.filter(i=>revitOf(i)==='DA').length;
  document.getElementById('nNU').textContent=D.filter(i=>revitOf(i)==='NU').length;
  document.getElementById('nVER').textContent=D.filter(i=>revitOf(i)==='VER').length;
  document.getElementById('nRFI').textContent=D.filter(i=>rfiOf(i)).length;
  document.getElementById('nINST').textContent=D.filter(i=>i.inst).length;
  document.getElementById('nTODO').textContent=D.filter(i=>!stOf(i)).length;
  document.getElementById('nNOTE').textContent=D.filter(i=>noteOf(i)).length;
  document.getElementById('nRMOD').textContent=D.filter(i=>isRevMod(i)).length;

  const g={};
  flt.forEach(it=>{
    if(!g[it.sectie]) g[it.sectie]={};
    if(!g[it.sectie][it.incapere]) g[it.sectie][it.incapere]=[];
    g[it.sectie][it.incapere].push(it);
  });

  const srcTH = SRC_HIDDEN ? '' : '<th class="src-th">Sursă</th>';

  let h=''; let sIdx=0;
  for(const s in g){
    sIdx++;
    const sid=curFloor.replace(/\s/g,'')+'-s'+sIdx;
    const sItems=Object.values(g[s]).flat();
    const sOk=sItems.filter(it=>stOf(it)==='ok').length;
    const closed=COLLAPSE[sid];
    h+=`<div class="sect-block">
      <div class="sect-hdr ${closed?'closed':''}" id="h-${sid}" onclick="toggleSect('${sid}')">
        <span class="lft"><span class="car">▼</span>${s}</span>
        <span class="prog">${sOk}/${sItems.length} bifate</span></div>
      <div class="sect-body ${closed?'hidden':''}" id="b-${sid}">`;
    let iIdx=0;
    for(const inc in g[s]){
      iIdx++;
      const iid=sid+'-i'+iIdx;
      const iItems=g[s][inc];
      const iOk=iItems.filter(it=>stOf(it)==='ok').length;
      h+=`<div class="inc-hdr" onclick="toggleSect('${iid}')"><span>${inc}</span><span class="mini">${iOk}/${iItems.length}</span></div>
        <div class="inc-body ${COLLAPSE[iid]?'hidden':''}" id="b-${iid}">
        <table><thead><tr>
        <th style="width:78px">Status</th><th>Cod</th><th>Denumire</th><th style="text-align:center">Buc</th>
        <th>Revit ✏️</th>${srcTH}<th>Instalații</th><th>Furnizor</th><th>Fișă</th><th style="min-width:180px">Observații + notițe</th><th title="Click pe celulă pentru a marca/demarca RFI">RFI</th>
        </tr></thead><tbody>`;
      for(const it of iItems){
        const st=stOf(it);
        const note=noteOf(it);
        const rv=revitOf(it);
        const mod=isRevMod(it);
        const rfi=rfiOf(it);
        const rfiMod=isRfiMod(it);
        const srcTD = SRC_HIDDEN ? '' : `<td class="src">${it.sursa}</td>`;
        h+=`<tr class="${st?'st-'+st:''}">
          <td><div class="stx">
            <button class="${st==='ok'?'ok':''}" onclick="setSt(${it.nr},'${st==='ok'?'':'ok'}')" title="OK">✓</button>
            <button class="${st==='ck'?'ck':''}" onclick="setSt(${it.nr},'${st==='ck'?'':'ck'}')" title="De verificat">?</button>
            <button class="${st==='px'?'px':''}" onclick="setSt(${it.nr},'${st==='px'?'':'px'}')" title="Problemă">✗</button>
          </div></td>
          <td class="cod">${it.cod||'—'}</td>
          <td class="den">${it.den}</td>
          <td class="buc">${it.buc}</td>
          <td><span class="badge b-${rv.toLowerCase()} ${mod?'mod':''}" onclick="cycleRevit(${it.nr},'${it.revit}')"
              title="Click: DA → NU → VER${mod?' (modificat — orig: '+it.revit+')':''}">${rv}${mod?'<span class="edit-hint">✏️</span>':''}</span></td>
          ${srcTD}
          <td class="inst">${it.inst||''}</td>
          <td style="font-size:11px">${it.furn||''}</td>
          <td class="fisa">${it.fisaUrl?`<a href="${it.fisaUrl}" target="_blank">PDF ↗</a>`:''}</td>
          <td class="obs">
            ${it.obs?`<span class="obs-orig">${it.obs}</span>`:''}
            <textarea class="obs-edit ${note?'has-note':''}" rows="1" placeholder="+ notița ta…"
              oninput="onNote(${it.nr},this.value);this.classList.toggle('has-note',!!this.value.trim())"
              onfocus="this.rows=3" onblur="this.rows=1">${note}</textarea>
          </td>
          <td class="rfi-cell" onclick="toggleRfi(${it.nr},${it.rfi})"
              title="${rfi?'RFI activ — click pentru a-l elimina':'Click pentru a marca RFI'}">
            <span class="${rfi?'rfi-on':'rfi-off'}">${rfi?'⚠️':'○'}</span>${rfiMod?'<span class="mod-dot">●</span>':''}
          </td>
        </tr>`;
      }
      h+='</tbody></table></div>';
    }
    h+='</div></div>';
  }
  if(!flt.length) h='<div style="padding:40px;text-align:center;color:var(--mut)">Niciun rezultat.</div>';
  document.getElementById('main').innerHTML=h;
}

function selFloor(f){ curFloor=f; render(); window.scrollTo(0,0) }

document.querySelectorAll('.fbtn').forEach(b=>{
  b.onclick=()=>{
    const f=b.dataset.f;
    if(filters.has(f)){ filters.delete(f); b.classList.remove('on') }
    else { filters.add(f); b.classList.add('on') }
    render();
  };
});
document.getElementById('q').oninput=e=>{ q=e.target.value.toLowerCase(); render() };

function exportJSON(){
  const blob=new Blob([JSON.stringify({status:ST,notes:NOTES,revit:RVOV,rfi:RFIOV,srcHidden:SRC_HIDDEN,exported:new Date().toISOString()},null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='spital-brasov-backup.json'; a.click();
}
function importJSON(){ document.getElementById('fileIn').click() }
document.getElementById('fileIn').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async()=>{ try{
    const o=JSON.parse(r.result);
    ST=o.status||{}; NOTES=o.notes||{}; RVOV=o.revit||{}; RFIOV=o.rfi||{};
    if(o.srcHidden!==undefined) SRC_HIDDEN=o.srcHidden;
    await store.set(K_ST,ST); await store.set(K_NT,NOTES);
    await store.set(K_RV,RVOV); await store.set(K_RF,RFIOV);
    await store.set(K_UI,{h:SRC_HIDDEN});
    render();
    document.getElementById('saveMsg').textContent='Import reușit ✓';
  }catch(err){ alert('Fișier invalid') } };
  r.readAsText(f);
};
function exportCSV(){
  let hdr='Etaj;Nr;Cod;Sectie;Incapere;Denumire;Buc;Revit original;Revit curent;RFI;Status;Notite';
  if(!SRC_HIDDEN) hdr+=';Sursa';
  let csv=hdr+'\n';
  for(const fl of FLOORS){
    ALL[fl].forEach(it=>{
      let row=[fl,it.nr,it.cod,it.sectie,it.incapere,'"'+it.den+'"',it.buc,it.revit,revitOf(it),
            rfiOf(it)?'DA':'',
            {'ok':'OK','ck':'DE VERIFICAT','px':'PROBLEMA'}[stOf(it)]||'',
            '"'+(noteOf(it)||'').replace(/"/g,'""')+'"'];
      if(!SRC_HIDDEN) row.push('"'+it.sursa+'"');
      csv+=row.join(';')+'\n';
    });
  }
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='spital-brasov-toate-etajele.csv'; a.click();
}

(async()=>{
  ST=await store.get(K_ST)||{};
  NOTES=await store.get(K_NT)||{};
  RVOV=await store.get(K_RV)||{};
  RFIOV=await store.get(K_RF)||{};
  const ui=await store.get(K_UI);
  if(ui && ui.h!==undefined) SRC_HIDDEN=ui.h;
  if(ROLE!=='lvd') SRC_HIDDEN=true;   /* extern: mereu fără sursă */
  render();
})();
</script>
