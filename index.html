<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dotări Medicale — Spital Brașov</title>
<style>
:root{
  --ink:#0e1c2e;
  --paper:#f7f8fa;
  --card:#ffffff;
  --navy:#1f4e78;
  --navy-lt:#2e75b6;
  --line:#dde3ea;
  --ok:#2e8b57;
  --warn:#c79100;
  --err:#c0392b;
  --mut:#6b7a8d;
  --da:#e2efda;
  --nu:#fce4d6;
  --ver:#fff2cc;
  --row-ok:#e4f5ea;
  --row-ck:#fdf4d7;
  --row-px:#fde7e4;
  --mono:'JetBrains Mono','Cascadia Code','Consolas',monospace;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:13px}

header{background:var(--navy);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
header .proj{font-family:var(--mono);font-size:10px;opacity:.75;letter-spacing:.5px}
.hdr-stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.12);border-radius:5px;padding:4px 10px;text-align:center;min-width:58px}
.stat b{display:block;font-size:15px;font-family:var(--mono)}
.stat span{font-size:9px;text-transform:uppercase;letter-spacing:.6px;opacity:.8}

.toolbar{background:var(--card);border-bottom:1px solid var(--line);padding:8px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:48px;z-index:40}
.toolbar input[type=search]{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:var(--paper)}
.fbtn{padding:6px 12px;border:1px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer;font-size:12px;white-space:nowrap;transition:.15s}
.fbtn:hover{border-color:var(--navy-lt)}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fbtn .n{font-family:var(--mono);font-size:10px;opacity:.7;margin-left:4px}

.wrap{display:flex;min-height:calc(100vh - 100px)}
nav{width:240px;background:var(--card);border-right:1px solid var(--line);padding:10px 0;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 100px);position:sticky;top:100px}
nav .etaj{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);padding:8px 16px 4px}
nav .sect{padding:7px 16px;cursor:pointer;font-size:12.5px;font-weight:600;border-left:3px solid transparent;transition:.12s}
nav .sect:hover{background:var(--paper)}
nav .sect.on{border-left-color:var(--navy);background:#eef3f9;color:var(--navy)}
nav .inc{padding:4px 16px 4px 28px;cursor:pointer;font-size:11.5px;color:var(--mut);border-left:3px solid transparent;display:flex;justify-content:space-between;gap:6px}
nav .inc:hover{background:var(--paper);color:var(--ink)}
nav .inc.on{border-left-color:var(--navy-lt);color:var(--navy);background:#f2f7fc}
nav .inc .cnt{font-family:var(--mono);font-size:9.5px;background:var(--paper);border-radius:8px;padding:1px 6px;flex-shrink:0}
main{flex:1;padding:14px 18px;overflow-x:auto}

.sect-block{margin-bottom:22px}
.sect-hdr{background:var(--navy-lt);color:#fff;padding:7px 12px;border-radius:6px 6px 0 0;font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.sect-hdr .prog{font-family:var(--mono);font-size:11px;opacity:.9}
.inc-hdr{background:#dcebf7;padding:5px 12px;font-weight:600;font-size:12px;color:var(--navy);border-left:3px solid var(--navy-lt);margin-top:1px;display:flex;justify-content:space-between;align-items:center}
.inc-hdr .mini{font-family:var(--mono);font-size:10px;color:var(--mut);font-weight:400}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:#eef2f7;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:5px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #edf1f5;vertical-align:middle;font-size:12.5px}
tr:hover td{filter:brightness(.98)}

/* ── Row highlight by status (no strikethrough) ── */
tr.st-ok td{background:var(--row-ok)}
tr.st-ck td{background:var(--row-ck)}
tr.st-px td{background:var(--row-px)}

.cod{font-family:var(--mono);font-size:10.5px;color:var(--navy);white-space:nowrap}
.den{font-weight:500}
.buc{font-family:var(--mono);text-align:center}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-da{background:var(--da);color:#3a6b28}
.b-nu{background:var(--nu);color:#a04818}
.b-ver{background:var(--ver);color:#8a6d00}
.inst{font-size:10.5px;white-space:nowrap}
.src{font-size:10px;white-space:nowrap}
.rfi-flag{color:var(--err);font-size:13px}
.fisa a{color:var(--navy-lt);font-size:10.5px;text-decoration:none}
.fisa a:hover{text-decoration:underline}

/* ── Editable observations ── */
.obs{font-size:11px;color:var(--mut);max-width:300px;min-width:160px}
.obs-orig{display:block;margin-bottom:2px}
.obs-edit{width:100%;border:1px dashed transparent;border-radius:4px;padding:3px 5px;font-size:11px;font-family:var(--sans);color:var(--ink);background:transparent;resize:vertical;min-height:20px;transition:.15s}
.obs-edit:hover{border-color:var(--line);background:rgba(255,255,255,.6)}
.obs-edit:focus{outline:none;border-color:var(--navy-lt);background:#fff;box-shadow:0 0 0 2px rgba(46,117,182,.12)}
.obs-edit::placeholder{color:#b8c2cd;font-style:italic}
.obs-edit.has-note{border-color:#cfe0f0;background:#f4f9ff;font-weight:500}

.stx{display:flex;gap:3px}
.stx button{width:26px;height:24px;border:1px solid var(--line);background:var(--card);border-radius:4px;cursor:pointer;font-size:12px;transition:.12s;padding:0;line-height:1}
.stx button:hover{transform:scale(1.1)}
.stx button.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.stx button.ck{background:var(--warn);border-color:var(--warn);color:#fff}
.stx button.px{background:var(--err);border-color:var(--err);color:#fff}

.pbar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;width:110px;overflow:hidden}
.pbar i{display:block;height:100%;background:#7fd49a;border-radius:2px;transition:.3s}

.footbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:8px 18px;display:flex;gap:10px;align-items:center;z-index:60}
.footbar .msg{font-size:11px;color:var(--mut);margin-left:auto}
.abtn{padding:7px 14px;border-radius:6px;border:1px solid var(--navy);background:var(--navy);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.abtn.sec{background:var(--card);color:var(--navy)}
.abtn:hover{opacity:.9}
main{padding-bottom:60px}

@media(max-width:900px){
  nav{display:none}
  .obs{max-width:170px;min-width:120px}
  header h1{font-size:13px}
}
</style>
</head>

<header>
  <div>

</div>

<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div class="footbar">

  <button class="abtn sec" onclick="importJSON()">⬆ Import</button>
  <button class="abtn sec" onclick="exportCSV()">⬇ Export CSV status+notițe</button>
  <span class="msg" id="saveMsg">Statusuri și notițe: se salvează automat</span>
</div>
<input type="file" id="fileIn" accept=".json" style="display:none">

/* ── Persistence: window.storage → localStorage → memory ── */
let ST = {};      /* statusuri: {nr: 'ok'|'ck'|'px'} */
let NOTES = {};   /* notite manuale: {nr: 'text'} */
const KEY = 'et4-status-v1';
const NKEY = 'et4-notes-v1';
const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); return r? JSON.parse(r.value):{} } }catch(e){}
    try{ const v = localStorage.getItem(k); return v? JSON.parse(v):{} }catch(e){}
    return {};
  },
  async set(k,o){
    try{ if(window.storage){ await window.storage.set(k, JSON.stringify(o)); return } }catch(e){}
    try{ localStorage.setItem(k, JSON.stringify(o)) }catch(e){}
  }
};

let filters = new Set();
let curSect = null, curInc = null, q = '';

function stOf(it){ return ST[it.nr] || '' }
function noteOf(it){ return NOTES[it.nr] || '' }

async function setSt(nr, val){
  if(val) ST[nr] = val; else delete ST[nr];
  await store.set(KEY, ST);
  render();
}

/* Debounced note saving — no re-render while typing */
let noteTimer = null;
function onNote(nr, val){
  if(val.trim()) NOTES[nr] = val; else delete NOTES[nr];
  clearTimeout(noteTimer);
  noteTimer = setTimeout(async ()=>{
    await store.set(NKEY, NOTES);
    document.getElementById('saveMsg').textContent = 'Salvat ✓ ' + new Date().toLocaleTimeString('ro-RO');
  }, 500);
}

function match(it){
  if(q){
    const s = (it.den+' '+it.cod+' '+it.furn+' '+it.obs+' '+noteOf(it)).toLowerCase();
    if(!s.includes(q)) return false;
  }
  for(const f of filters){
    if(f.startsWith('revit:') && it.revit !== f.split(':')[1]) return false;
    if(f==='rfi' && !it.rfi) return false;
    if(f==='inst' && !it.inst) return false;
    if(f==='st:todo' && stOf(it)) return false;
    if(f==='note' && !noteOf(it)) return false;
  }
  if(curSect && it.sectie !== curSect) return false;
  if(curInc && it.incapere !== curInc) return false;
  return true;
}

function renderNav(){
  const bySect = {};
  DATA.forEach(it=>{
    if(!bySect[it.sectie]) bySect[it.sectie]={};
    if(!bySect[it.sectie][it.incapere]) bySect[it.sectie][it.incapere]=0;
    bySect[it.sectie][it.incapere]++;
  });
  let h = '<div class="etaj">Etaj 4 — secții</div>';
  h += `<div class="sect ${!curSect?'on':''}" onclick="selSect(null)">Toate secțiile</div>`;
  for(const s in bySect){
    h += `<div class="sect ${curSect===s?'on':''}" onclick="selSect('${esc(s)}')">${s}</div>`;
    if(curSect===s){
      for(const i in bySect[s]){
        h += `<div class="inc ${curInc===i?'on':''}" onclick="selInc('${esc(i)}')">
          <span>${i.length>34?i.slice(0,34)+'…':i}</span><span class="cnt">${bySect[s][i]}</span></div>`;
      }
    }
  }
  document.getElementById('nav').innerHTML = h;
}
function esc(s){ return s.replace(/'/g,"\\'") }
function selSect(s){ curSect = s; curInc = null; render() }
function selInc(i){ curInc = curInc===i? null : i; render() }

function render(){
  renderNav();
  const items = DATA.filter(match);

  const all = DATA.length;
  const done = DATA.filter(it=>stOf(it)==='ok').length;
  const ck   = DATA.filter(it=>stOf(it)==='ck').length;
  const px   = DATA.filter(it=>stOf(it)==='px').length;
  const pct = Math.round(100*done/all);
  document.getElementById('hdrStats').innerHTML = `
    <div class="stat"><b>${all}</b><span>Total</span></div>
    <div class="stat"><b style="color:#7fd49a">${done}</b><span>OK ✓</span></div>
    <div class="stat"><b style="color:#ffd97f">${ck}</b><span>Verific ?</span></div>
    <div class="stat"><b style="color:#ff9d8a">${px}</b><span>Problemă</span></div>
    <div class="stat"><b>${pct}%</b><span>Progres</span><div class="pbar"><i style="width:${pct}%"></i></div></div>`;

  document.getElementById('nDA').textContent  = DATA.filter(i=>i.revit==='DA').length;
  document.getElementById('nNU').textContent  = DATA.filter(i=>i.revit==='NU').length;
  document.getElementById('nVER').textContent = DATA.filter(i=>i.revit==='VER').length;
  document.getElementById('nRFI').textContent = DATA.filter(i=>i.rfi).length;
  document.getElementById('nINST').textContent= DATA.filter(i=>i.inst).length;
  document.getElementById('nTODO').textContent= DATA.filter(i=>!stOf(i)).length;
  document.getElementById('nNOTE').textContent= DATA.filter(i=>noteOf(i)).length;

  const g = {};
  items.forEach(it=>{
    if(!g[it.sectie]) g[it.sectie] = {};
    if(!g[it.sectie][it.incapere]) g[it.sectie][it.incapere] = [];
    g[it.sectie][it.incapere].push(it);
  });

  let h='';
  for(const s in g){
    const sItems = Object.values(g[s]).flat();
    const sOk = sItems.filter(it=>stOf(it)==='ok').length;
    h += `<div class="sect-block">
      <div class="sect-hdr"><span>▶ ${s}</span><span class="prog">${sOk}/${sItems.length} bifate</span></div>`;
    for(const inc in g[s]){
      const iItems = g[s][inc];
      const iOk = iItems.filter(it=>stOf(it)==='ok').length;
      h += `<div class="inc-hdr"><span>${inc}</span><span class="mini">${iOk}/${iItems.length}</span></div>
        <table><thead><tr>
        <th style="width:78px">Status</th><th>Cod</th><th>Denumire</th><th style="text-align:center">Buc</th>
        <th>Revit</th><th>Sursă</th><th>Instalații</th><th>Furnizor</th><th>Fișă</th><th style="min-width:180px">Observații + notițe</th><th></th>
        </tr></thead><tbody>`;
      for(const it of iItems){
        const st = stOf(it);
        const note = noteOf(it);
        const rowCls = st ? 'st-'+st : '';
        h += `<tr class="${rowCls}">
          <td><div class="stx">
            <button class="${st==='ok'?'ok':''}" onclick="setSt(${it.nr}, '${st==='ok'?'':'ok'}')" title="OK">✓</button>
            <button class="${st==='ck'?'ck':''}" onclick="setSt(${it.nr}, '${st==='ck'?'':'ck'}')" title="De verificat">?</button>
            <button class="${st==='px'?'px':''}" onclick="setSt(${it.nr}, '${st==='px'?'':'px'}')" title="Problemă">✗</button>
          </div></td>
          <td class="cod">${it.cod||'—'}</td>
          <td class="den">${it.den}</td>
          <td class="buc">${it.buc}</td>
          <td><span class="badge b-${it.revit.toLowerCase()}">${it.revit}</span></td>
          <td class="src">${it.sursa}</td>
          <td class="inst">${it.inst||''}</td>
          <td style="font-size:11px">${it.furn||''}</td>
          <td class="fisa">${it.fisaUrl?`<a href="${it.fisaUrl}" target="_blank">PDF ↗</a>`:''}</td>
          <td class="obs">
            ${it.obs?`<span class="obs-orig">${it.obs}</span>`:''}
            <textarea class="obs-edit ${note?'has-note':''}" rows="1" placeholder="+ notița ta…"
              oninput="onNote(${it.nr}, this.value); this.classList.toggle('has-note', !!this.value.trim())"
              onfocus="this.rows=3" onblur="this.rows=1">${note}</textarea>
          </td>
          <td>${it.rfi?'<span class="rfi-flag" title="RFI deschis">⚠️</span>':''}</td>
        </tr>`;
      }
      h += '</tbody></table>';
    }
    h += '</div>';
  }
  if(!items.length) h = '<div style="padding:40px;text-align:center;color:var(--mut)">Niciun rezultat pentru filtrele curente.</div>';
  document.getElementById('main').innerHTML = h;
}

document.querySelectorAll('.fbtn').forEach(b=>{
  b.onclick = ()=>{
    const f = b.dataset.f;
    if(filters.has(f)){ filters.delete(f); b.classList.remove('on') }
    else { filters.add(f); b.classList.add('on') }
    render();
  };
});
document.getElementById('q').oninput = e=>{ q = e.target.value.toLowerCase(); render() };

function exportJSON(){
  const blob = new Blob([JSON.stringify({status:ST, notes:NOTES, exported:new Date().toISOString()},null,1)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'et4-backup.json'; a.click();
}
function importJSON(){ document.getElementById('fileIn').click() }
document.getElementById('fileIn').onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async ()=>{ try{
    const o = JSON.parse(r.result);
    ST = o.status || {}; NOTES = o.notes || {};
    await store.set(KEY, ST); await store.set(NKEY, NOTES);
    render();
    document.getElementById('saveMsg').textContent = 'Import reușit ✓';
  }catch(err){ alert('Fișier invalid') } };
  r.readAsText(f);
};
function exportCSV(){
  let csv = 'Nr;Cod;Sectie;Incapere;Denumire;Buc;Revit;Status;Notite\n';
  DATA.forEach(it=>{
    csv += [it.nr,it.cod,it.sectie,it.incapere,'"'+it.den+'"',it.buc,it.revit,
            {'ok':'OK','ck':'DE VERIFICAT','px':'PROBLEMA'}[stOf(it)]||'',
            '"'+(noteOf(it)||'').replace(/"/g,'""')+'"'].join(';')+'\n';
  });
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'et4-status-notite.csv'; a.click();
}

(async ()=>{
  ST = await store.get(KEY);
  NOTES = await store.get(NKEY);
  render();
})();
</script>
</body>
</html>
